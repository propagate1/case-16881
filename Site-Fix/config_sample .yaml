# サイト構成ガイド生成用設定ファイル
# このファイルをコピーして、プロジェクトに合わせて編集してください

site_name: "YOUR_SITE_NAME"

# 共通セクション（ヘッダー・フッター）
common_sections:
  - name: "ヘッダー（全ページ共通）"
    content: |
      サイト名
      
      ・ナビゲーション1
      ・ナビゲーション2
      ・ナビゲーション3
      ►お問い合わせ

  - name: "フッター（全ページ共通）"
    content: |
      サイト名
      
      サイトの説明文をここに記載します。
      
      サイトマップ
      ・ホーム
      ・サービス
      ・会社概要
      ・お問い合わせ
      
      運営会社
      株式会社○○
      
      © 2025 YOUR_SITE_NAME. All rights reserved.

# ページ定義
pages:
  - name: "トップページ"
    sections:
      - name: "ヒーローセクション"
        content: |
          【ヒーローセクション】
          
          メインキャッチコピー
          
          サブキャッチコピーや説明文
          
          ►CTAボタン

      - name: "サービス紹介"
        content: |
          【サービス紹介】
          
          セクション見出し
          
          ■サービス1
          サービス1の説明文
          
          ■サービス2
          サービス2の説明文
          
          ■サービス3
          サービス3の説明文

      - name: "お問い合わせCTA"
        content: |
          【お問い合わせ】
          
          お気軽にご連絡ください。
          
          ►お問い合わせ

  - name: "サービスページ"
    sections:
      - name: "ヒーローセクション"
        content: |
          【サービス】
          
          ページタイトル
          
          ページの説明文

      - name: "サービス詳細"
        content: |
          【サービス詳細】
          
          詳細な説明をここに記載します。

  - name: "会社概要ページ"
    sections:
      - name: "ヒーローセクション"
        content: |
          【会社概要】
          
          ページタイトル
          
          ページの説明文

      - name: "会社情報"
        content: |
          【会社情報】
          
          会社名：株式会社○○
          所在地：東京都○○区
          設立：20XX年X月
          代表者：山田 太郎

  - name: "お問い合わせページ"
    sections:
      - name: "ヒーローセクション"
        content: |
          【お問い合わせ】
          
          ページタイトル
          
          お問い合わせフォームの説明文

      - name: "お問い合わせフォーム"
        content: |
          【お問い合わせフォーム】
          
          ・お名前（必須）
          ・メールアドレス（必須）
          ・電話番号（任意）
          ・お問い合わせ内容（必須）
          
          ►送信する

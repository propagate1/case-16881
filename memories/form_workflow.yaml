# =============================================================================
# トラブルシューティング
# =============================================================================
troubleshooting:
  issue_1:
    problem: "フォームが送信できない"
    symptoms:
      - "送信ボタンを押しても反応しない"
      - "コンソールにエラーが表示される"
    solutions:
      - "ブラウザの開発者ツール（F12）でコンソールエラーを確認"
      - "サイトIDが正しく設定されているか確認（initializeFormHandler内）"
      - "FormHandler SDKが正しく読み込まれているか確認（Script タグ）"
      - "許可ドメインが管理画面に登録されているか確認"
  
  issue_2:
    problem: "メールが届かない"
    symptoms:
      - "フォームは送信できるが、メールが届かない"
    solutions:
      - "管理画面の「データ確認」にデータが保存されているか確認"
      - "adminEmail が正しく設定されているか確認"
      - "迷惑メールフォルダを確認"
      - "emailTemplateId が存在するか確認（使用している場合）"
  
  issue_3:
    problem: "CORSエラーが発生する"
    symptoms:
      - "ブラウザコンソールに CORS エラーが表示される"
      - "フォーム送信がブロックされる"
    solutions:
      - "管理画面の「許可ドメイン」に現在のドメインが登録されているか確認"
      - "ドメインは https:// を含む完全なURLで登録（例: https://example.com）"
      - "開発環境の場合は http://localhost:3000 等も登録が必要"


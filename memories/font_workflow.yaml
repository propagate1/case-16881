## 🔑 キーワードと雰囲気のマッピング

AIは以下のキーワードから雰囲気を判断します：

- 「かわいい」「可愛い」「kawaii」 → **kawaii**
- 「上品」「高級」「エレガント」「elegant」 → **elegant**
- 「やさしい」「ナチュラル」「自然」「natural」 → **natural**
- 「かっこいい」「クール」「テック」「cool」 → **cool**
- 「シンプル」「simple」 → **simple**
- 「ポップ」「明るい」「pop」 → **pop**
- 「和風」「和」「日本的」「wa」 → **wa**

---

## ⚙️ コマンド仕様

### 基本形式：
```bash
node scripts/setup-fonts.js [vibe] --display=[display-key] --body=[body-key]
```

### 例：
```bash
# かわいい系：Zen Maru Gothic + Kosugi Maru
node scripts/setup-fonts.js kawaii --display=zen-maru --body=kosugi-maru

# 上品系：Cormorant Garamond + Noto Serif JP
node scripts/setup-fonts.js elegant --display=cormorant --body=noto-serif

# オプション省略時：デフォルト（最初の選択肢）
node scripts/setup-fonts.js kawaii
# → zen-maru + zen-kaku
```

---


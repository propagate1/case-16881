## 🏗️ 設計思想：テンプレートプロジェクトとしてのフォント適用

### このプロジェクトは「DefaultSetting」テンプレート

このプロジェクトは**クローンして使うテンプレート**として設計されています。

### フォント適用の方針：アプローチ1（クラスベース）

#### ✅ 採用した方針
```typescript
// layout.tsx に最初から font-body クラスを記述
<body className="antialiased font-body">
```

#### なぜこのアプローチ？

**テンプレートとして配布する場合のメリット：**

1. **クローンした人は何も考えなくていい**
   - `npm run setup-fonts:kawaii` を実行するだけ
   - 自動的にフォントが全体に適用される

2. **明示的で分かりやすい**
   - HTMLを見れば「フォントクラスがある」と一目で分かる
   - 新しい開発者がカスタマイズしやすい
   - デバッグが簡単（DevToolsでクラスが見える）

3. **Tailwindの思想に沿っている**
   - ユーティリティファーストアプローチ
   - グローバルスタイルを最小限に保てる

4. **柔軟性が高い**
   - 部分的な上書きが簡単
   - 特定の要素だけ別のフォントにできる

#### 比較：アプローチ2（globals.css で一括設定）を採用しない理由

```css
/* このアプローチは採用しない */
@layer base {
  body { font-family: var(--font-body); }
  h1, h2, h3, h4, h5, h6 { font-family: var(--font-display); }
}
```

**デメリット：**
- ❌ 暗黙的（HTMLを見てもフォントが適用されているか分からない）
- ❌ グローバルな強制適用
- ❌ Tailwindのユーティリティファーストから外れる

### scripts/setup-fonts.js の自動化

#### 🔄 デフォルト状態とフォント自動化の関係

**デフォルト状態（クローン直後）：**
```typescript
// app/layout.tsx - Geistフォントが設定されている
import { Geist, Geist_Mono } from "next/font/google";

const geistSans = Geist({
  variable: "--font-geist-sans",
  subsets: ["latin"],
});

<body className={`${geistSans.variable} ${geistMono.variable} antialiased`}>
```

**この状態のメリット：**
- ✅ クローン直後から正常に動作する
- ✅ フォント自動化を使わない人も困らない
- ✅ Next.jsのデフォルト設定として自然

---

**フォント自動化実行後（`npm run setup-fonts:kawaii` など）：**

`scripts/setup-fonts.js`の`updateLayout()`関数（289-305行目）が以下を**自動的に**実行：

1. **Geistフォントのimportを削除**
```javascript
layoutContent = layoutContent.replace(/import\s+{\s*Geist[^}]*}\s+from\s+["']next\/font\/google["'];?\n?/g, '');
```

2. **Geistフォントの定義を削除**
```javascript
layoutContent = layoutContent.replace(/const\s+geist\w+\s*=\s*Geist[^}]+}\);?\s*\n?/g, '');
```

3. **classNameをfont-bodyクラスに置き換え**
```javascript
// className から geist 変数を削除し、font-body クラスを追加
layoutContent = layoutContent.replace(/className=\{`\$\{geist[^}]+\}\s*antialiased`\}/g, 'className="antialiased font-body"');
// ...
// 既に font-body がない antialiased のみの場合も追加
layoutContent = layoutContent.replace(/className="antialiased"(?![\s\S]*font-body)/g, 'className="antialiased font-body"');
```

4. **フォントCSSのimportを追加**
```javascript
layoutContent = 
  'import "../lib/fonts/_active.css";\n' +
  'import "../lib/fonts/_vars.css";\n' +
  layoutContent;
```

**結果：**
```typescript
// app/layout.tsx - 自動変換後
import "../lib/fonts/_active.css";
import "../lib/fonts/_vars.css";
import "./globals.css";

<body className="antialiased font-body">
```

---

#### 💡 重要：手動での変更は不要

開発者は何も手動で変更する必要はありません：
1. プロジェクトをクローン → Geistフォントで動作
2. `npm run setup-fonts:kawaii` を実行 → 自動的にフォント置換
3. 完了！

これにより：
- ✅ デフォルト状態が壊れない
- ✅ フォント自動化は完全自動
- ✅ 柔軟性が保たれる

### 使い方の例

```tsx
// デフォルト：font-body が自動適用される
<p>これは本文です</p>

// 見出し：font-display クラスを使用
<h1 className="font-display text-4xl">見出しです</h1>

// 特殊ケース：個別にフォントを変更
<p className="font-display">本文だけど見出しフォントを使いたい</p>
```

### まとめ

- ✅ **テンプレートプロジェクト** = クラスベースで明示的に
- ✅ **既存プロジェクトへの導入** = globals.cssで一括設定が便利
- ✅ このプロジェクトは前者なので、アプローチ1を採用

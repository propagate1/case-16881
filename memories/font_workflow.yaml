# フォント自動化ワークフロー v2.0（複数選択対応）

## AIアシスタントの動作フロー

### ユーザーが「かわいいフォントにしたい」などと言った場合の対応手順

#### **重要：チャット内で完結させる**

ユーザーとの対話でフォントを選択し、コマンドを自動実行します。

---

## 📋 実行フロー

### ステップ1：プロジェクト初期設定を確認・実行

```bash
npm run setup-font-project
```

このコマンドは何度実行しても安全（冪等性あり）

---

### ステップ2：フォント選択を提示

#### ユーザーが「かわいいフォントにしたい」と言った場合：

**AIの応答例：**

```
かわいいフォントですね！
見出し用フォントを選んでください：

1) Zen Maru Gothic（丸ゴシック） - やわらかい印象
2) M PLUS Rounded 1c（丸み） - 親しみやすい
3) Hannari（はんなり） - 日本的なやさしさ

どれにしますか？（番号で答えてください）
```

**ユーザーが「1」と答えた場合：**

```
承知しました！次は本文用フォントを選んでください：

1) Zen Kaku Gothic New（ゴシック） - 読みやすい
2) Kosugi Maru（丸ゴシック） - やわらかい
3) Kokoro（やさしい） - ほのぼの

どれにしますか？（番号で答えてください）
```

**ユーザーが「2」と答えた場合：**

```
承知しました！
見出し：Zen Maru Gothic
本文：Kosugi Maru
でセットアップします。
```

---

### ステップ3：コマンドを実行

```bash
npm run setup-font-project && node scripts/setup-fonts.js kawaii --display=zen-maru --body=kosugi-maru
```

---


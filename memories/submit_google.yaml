# =============================================================================
# Google提出 自動化ワークフロー（v2.2.0）
# =============================================================================
# 目的: Google Search Console への提出に必要な設定を自動化
#
# 対象: Next.js + Tailwind CSS プロジェクト（DefaultSetting クローン）
# 作成日: 2025-11-04
# 最終更新: 2025-11-04
# =============================================================================

schema_version: "2.2.0"

metadata:
  workflow_name: "Google提出 自動化"
  target_framework: "Next.js 13+ (App Router)"
  enforcement: "MANDATORY"
  version: "2.2.0"
  created: "2025-11-04"
  updated: "2025-11-04"
  author: "DefaultSetting Project"
  description: |
    Google提出に必要な5つのタスクを完全自動化：
    1. altタグ設定（MANDATORY品質チェック + 7つの冗長パターン検出&自動改善）
    2. metadata 設定（市場分析 + SEO最適化）
    3. sitemap.ts 作成（CRITICAL外部URL混入防止）
    4. robots.txt 作成（重要設定）
    5. URLスラッグ最適化（サイト内容分析）
    
    v2.2.0: 品質チェック・バリデーションを MANDATORY 化、絶対にスキップ不可

# =============================================================================
# トリガー設定
# =============================================================================
triggers:
  main_keywords:
    - "Google提出"
  
  action_keywords:
    - "して"
    - "お願い"
    - "作成して"
    - "セットアップして"
    - "設定して"
  
  exclude_keywords:
    - "必要ですか"
    - "方法"
    - "教えて"
    - "説明"
    - "?"
    - "？"

# =============================================================================
# ワークフロー1: altタグ設定
# =============================================================================
workflow_1_alt_tags:
  
  name: "画像の alt 属性を自動設定"
  
  description: |
    サイト内のすべての画像（<Image>, <img>, CSS背景画像）を検出し、
    alt 属性がないものに対して、コンテキストを分析して適切な alt テキストを自動生成・設定する。
  
  instructions: |
    1. app/ と app/components/ 内のすべての .tsx ファイルをサイトを見て確認
    
    2. 画像を検出（🚨 重要: multiline モード使用）
       
       推奨される検索パターン（シンプルで確実）:
       - pattern: "Image" （Next.js Image コンポーネント、最も確実）← ユーザー実証済み ✅
       - pattern: 'src="' （すべてのsrc属性を検出）
       - pattern: 'src=.*\.(jpg|png|jpeg|svg|webp)' （画像ファイル拡張子で検出）
       
       🚨 避けるべきパターン（実際に失敗した例）:
       - ❌ '<Image|<img' （< が特殊文字、| の使用も不適切、検出失敗）← ユーザー報告
       - ❌ '<Image' （< のエスケープが必要、複雑で不要）
       - ❌ "img" のみ（不十分、Image コンポーネントを見逃す可能性）
       
       ✅ 最推奨: pattern: "Image" （シンプルで確実、実証済み）
       
       ✅ multiline: true を指定（複数行にまたがる Image タグも検出）
       ✅ 検出したファイルを read_file で読み込んで内容を確認
    
    3. 各画像の alt 属性を確認
       - alt 属性がない → 生成して追加
       - alt 属性が不適切（"画像", "写真", "test", "sample" など） → 改善して修正
       
       生成ルール:
       - ファイル名、周辺コンテキスト（セクション名、見出し）、className から推測
       - about.yaml から会社名/サービス名を取得（可能な場合）
       - 簡潔で具体的な説明（15字以内推奨、20字以内許容）
       - 「画像」「写真」「イメージ」などの冗長な語は避ける
    
    4. 品質チェック
       - 文字数: 20字以内か
       - 冗長な語: 含まれていないか
       - 具体性: 具体的な説明になっているか
       - 不適切な alt がある場合は自動的に改善
    
    5. search_replace で alt 属性を追加または修正
  
  generation_examples:
    新規追加:
      - '<Image src="/logo.png" /> + <header> 内 → "株式会社〇〇のロゴ"'
      - '<Image src="/hero-bg.jpg" /> + hero セクション → "〇〇サービスのメインビジュアル"'
      - '<img src="/office.jpg" /> + <p>東京オフィス</p> の下 → "東京オフィスの外観"'
    
    不適切な alt の修正:
      - '<img src="/test.jpg" alt="画像" /> → alt="テストセクションの説明"'
      - '<Image src="/hero.jpg" alt="写真" /> → alt="メインビジュアル"'
      - '<Image src="/sample.png" alt="sample" /> → alt="サービスアイコン"'
      - '<img src="/logo.png" alt="株式会社メディアプルーフのロゴマークの画像" /> → alt="株式会社メディアプルーフのロゴ"（冗長な語を削除、文字数削減）'
  
  important_notes:
    - CSS背景画像には alt 属性を設定できない（検出のみ行う）
    - 装飾的な画像はaria-label または説明テキストで対応
  
  quality_check_and_fix:
    status: "MANDATORY"
    skip_allowed: false
    enforcement: "CRITICAL"
    
    description: |
      生成した alt テキストが適切か自動検証し、不適切な場合は自動修正する。
      🚨 このステップは絶対にスキップしてはいけません。
    
    mandatory_rules: |
      - alt 属性が存在するかの確認だけでは不十分
      - 必ず品質チェックを実行すること
      - 不適切な alt（"画像", "写真", "test" など）を見逃さない
      - 品質チェックをスキップした場合は、ワークフロー違反
    
    validation_and_fix_rules:
      - name: "文字数チェック"
        check: "20字以内か（15字以内推奨）"
        if_too_long: "冗長な部分を削除して15字以内に改善"
        example: "株式会社メディアプルーフのロゴマークの画像（22字） → 株式会社メディアプルーフのロゴ（15字）"
      
      - name: "冗長な単語のチェック"
        forbidden_words: ["画像", "写真", "イメージ", "image", "photo", "ピクチャー", "picture"]
        check: "これらの語が含まれていないか"
        if_found: "冗長な語を削除して改善"
        examples:
          - 'alt="画像" → コンテキストから適切な説明を生成'
          - 'alt="ロゴの画像" → "ロゴ"'
          - 'alt="東京オフィスの外観写真" → "東京オフィスの外観"'
      
      - name: "冗長な修飾語のチェック"
        forbidden_patterns: ["〜用の", "〜のための", "〜に関する", "〜についての"]
        check: "冗長な修飾語が含まれていないか"
        if_found: "修飾語を削除して簡潔化"
        examples:
          - 'alt="サービス紹介用の画像" → "サービス紹介"'
          - 'alt="お問い合わせのためのアイコン" → "お問い合わせアイコン"'
      
      - name: "重複語のチェック"
        check: "同じ意味の語が重複していないか"
        examples:
          - 'alt="メインビジュアルイメージ" → "メインビジュアル"（ビジュアル=イメージで重複）'
          - 'alt="ロゴマーク" → "ロゴ"（ロゴ=マークで重複）'
        if_found: "重複を削除"
      
      - name: "語尾の冗長性チェック"
        forbidden_suffixes: ["の画像", "の写真", "のイメージ", "のピクチャー"]
        check: "これらの語尾が含まれていないか"
        if_found: "語尾を削除"
        examples:
          - 'alt="ロゴの画像" → "ロゴ"'
          - 'alt="オフィスの写真" → "オフィス"'
      
      - name: "具体性チェック"
        forbidden_generic: ["test", "sample", "temp", "image1", "photo1", "pic"]
        check: "汎用的な語が含まれていないか"
        if_found: "コンテキストから具体的な説明を生成"
        examples:
          - 'alt="test" → ファイル名とコンテキストから適切な説明を生成'
          - 'alt="sample" → コンテキストから具体的な説明を生成'
      
      - name: "会社名/サービス名の含有（推奨）"
        check: "可能な場合は会社名またはサービス名が含まれているか"
        if_not_found: "about.yaml から会社名を取得して追加（可能な場合）"
        note: "必須ではないが、含まれている方がSEO的に望ましい"
    
    auto_fix_process: |
      1. 生成した alt テキストを検証
      2. 不適切な点を発見したら自動的に改善
      3. 改善後の alt テキストで search_replace を実行
      4. 検証結果を報告
    
    output_on_quality_check:
      if_all_pass: |
        ✅ すべての alt 属性が品質基準をクリアしました
      
      if_auto_fixed: |
        ✅ 一部の alt 属性を自動改善しました
        
        改善内容:
        - {image_path}: "{before}" → "{after}" （理由: {reason}）
  
  output:
    template: |
      ✅ 画像に alt 属性を設定しました
      
      【<Image> / <img> タグ】
      更新したファイル:
      - {file_list}
      
      追加した alt 属性:
      - {image_path}: "{alt_text}"
      
      【CSS背景画像】（検出のみ）
      - {bg_image_list}
      
      💡 確認:
      生成された alt テキストが適切か確認し、必要に応じて手動で修正してください。

# =============================================================================
# ワークフロー2: metadata 設定
# =============================================================================
workflow_2_metadata:
  
  name: "app/layout.tsx に metadata を設定"
  
  description: |
    title, description, keywords, openGraph, twitter を含む完全なSEO設定を自動実装。
  
  information_sources:
    priority_1:
      name: "既存 metadata（layout.tsx）"
      action: "title, description, keywords, canonical すべて存在する場合は再利用"
      note: "ドメイン接続で設定済みの可能性がある"
      reuse: "既存の値をそのまま使用し、openGraph, twitter のみ新規生成"
      canonical_handling: "既存の canonical があれば保持、なければ新規追加しない（ドメイン接続で設定済みのはず）"
    
    priority_2:
      name: "about.yaml（サイト構成シート）"
      action: "既存 metadata がない場合は about.yaml から情報を抽出"
      extract: "site.name, contact_defaults.address, pages[].sections から会社名・地域・サービスを抽出"
    
    priority_3:
      name: "app/page.tsx（コードファイル）"
      action: "about.yaml もない場合は page.tsx から情報を抽出"
      extract: "h1タグ、hero セクション、Footer の住所、サービスカードから情報を抽出"
    
  seo_generation:
    condition: "既存 metadata がない場合のみ生成"
    
    note: |
      既存 metadata がある場合（ドメイン接続で設定済み）は、
      既存の値を再利用して openGraph, twitter のみ生成。
    
    # キーワード生成（市場分析）
    keywords:
      method: "市場・競合・検索意図を分析し、一次キーワード（5語）を選定"
      criteria:
        - "会社名/サービス名（必須）"
        - "主要地域 + サービス（例: 東京 校閲）"
        - "業界キーワード、事業内容キーワード"
      with_metadata: "検索ボリューム推定（Low/Mid/High）、競合難易度（Low/Mid/High）"
    
    # タイトルタグ生成
    title:
      required: "会社名 + 主要地域 + 一次キーワード + CTA/ベネフィット"
      length: "28-32全角字（600px以内）"
      rules:
        - "数字は半角、単位は全角（例：24時間、365日）"
        - "同一語句の連続は2回まで"
        - "句読点は「、」「。」、英字間は半角スペース"
      example: "株式会社メディアプルーフ - 東京の校閲サービス | メディアの正しさを担保（32 文字）"
    
    # メタディスクリプション生成
    description:
      keyword_usage: "一次KW 2-3回、二次KW 1-2回を自然に含める"
      length: "90-120全角字（推奨110字、途中で「…」が入らないように）"
      structure: "会社紹介 → サービス内容 → ベネフィット → 行動喚起"
      rules:
        - "数字は半角、単位は全角"
        - "ネガティブ語は使用しない（例：孤独死など）"
        - "同一語句の連続は2回まで"
        - "句読点は「、」「。」、英字間は半角スペース"
      example: "株式会社メディアプルーフは、ニュース番組・広告・公共案件の校閲に特化したサービスを提供。誤字脱字のチェックに留まらず、ウラ取り・修正案の提示まで対応。東京都新宿区を拠点に、高度な校閲で制作物の品質と信頼を守ります。お気軽にお問い合わせください。（120 文字）"
    
  openGraph_twitter:
    action: "openGraph と twitter を生成（常に実行）"
    template: |
      openGraph: {
        title: "{title}",
        description: "{description}",
        type: "website",
        locale: "ja_JP",
      },
      twitter: {
        card: "summary_large_image",
        title: "{title}",
        description: "{description}",
      }
  
  layout_update:
    action: "app/layout.tsx を更新"
    method: "search_replace で既存 metadata を置換、または新規作成"
    note: |
      既存 metadata がある場合は置換。
      ない場合は export default function RootLayout の直前に新規作成。
      import { Metadata } from 'next' も必要に応じて追加。
  
  output:
    template: |
      ✅ app/layout.tsx に metadata を設定しました
      
      【基本情報】
      - title: {title}（{文字数} 文字）
      - description: {description}（{文字数} 文字）
      - keywords: [{keywords}]
      - canonical: {canonical_url}（既存を保持、またはドメイン接続で設定済み）
      
      【SNS対応】
      - openGraph: 設定完了
      - twitter: 設定完了

# =============================================================================
# ワークフロー3: sitemap.ts 作成
# =============================================================================
workflow_3_sitemap:
  
  name: "app/sitemap.ts を作成"
  description: "Next.js の動的サイトマップ生成機能を使用"
  
  process:
    step_1:
      action: "ベースURL を取得"
      source: "vercel.json の destination"
      extraction: |
        1. vercel.json を read_file で読み込む
        2. redirects[].destination から "https://www.{DOMAIN}/:path*" を探す
        3. "/:path*" を削除して "https://www.{DOMAIN}" を抽出
      pattern: "https://[^/:]+"
      fallback: "vercel.json がなければユーザーに確認"
    
    step_2:
      action: "ページ一覧を取得（ファイルシステムのみ）"
      status: "CRITICAL"
      skip_allowed: false
      enforcement: "MANDATORY"
      
      critical_rule: |
        🚨 CRITICAL: ファイルシステム上の page.tsx のみを検出する。
        コード内のリンク（<a href="...">, <Link href="...">）は検出しない。
        外部URLは絶対に含めない。
        
        この制約を守らないと、sitemap.xml に外部URLが混入する危険性がある。
        絶対にスキップしてはいけません。
      
      method:
        tool: "grep または glob_file_search"
        pattern: "**/page.tsx"
        target: "app/ ディレクトリ"
        example_command: 'find app -name "page.tsx"'
      
      detection_result:
        description: "検出されるのはファイルパスのみ"
        examples:
          - "app/page.tsx"
          - "app/about/page.tsx"
          - "app/company/page.tsx"
          - "app/blog/[slug]/page.tsx"
        
        not_detected:
          - "コード内の <a href='https://google.com'> ← 検出しない"
          - "コード内の <Link href='/about'> ← 検出しない"
          - "外部URL ← 検出しない"
      
      conversion_rules:
        description: "ファイルパスをURLパスに変換（5ステップ）"
        
        step_1: "app/ プレフィックスを削除"
        step_2: "/page.tsx サフィックスを削除"
        step_3: "空文字列の場合は / にする"
        step_4: "末尾に / を追加（/ 以外）"
        step_5: "[slug], [id] などを含む場合は親ディレクトリまで"
        
        examples:
          - input: "app/page.tsx"
            output: "/"
          
          - input: "app/about/page.tsx"
            step_1: "about/page.tsx"
            step_2: "about/"
            output: "/about/"
          
          - input: "app/blog/[slug]/page.tsx"
            step_1: "blog/[slug]/page.tsx"
            step_2: "blog/[slug]/"
            step_5: "blog/（[slug] を削除）"
            output: "/blog/"
        
        dynamic_route_handling:
          rule: "[slug], [id], [...slug] を含むパスは親ディレクトリまで"
          reason: "具体的な値が不明なため、一覧ページのみ含める"
          pattern: "正規表現で \\[.*\\] を検出し削除"
    
    step_3:
      action: "app/sitemap.ts を生成"
      
      template: |
        import type { MetadataRoute } from 'next';

        export default function sitemap(): MetadataRoute.Sitemap {
          const baseUrl = '{BASE_URL}';
          
          const routes = [
            {ROUTES}
          ];

          return routes.map((route) => ({
            url: `${baseUrl}${route}`,
            lastModified: new Date(),
            changeFrequency: 'monthly' as const,
            priority: route === '/' ? 1.0 : 0.8,
          }));
        }
      
      validation:
        - "ベースURL が https:// で始まる"
        - "ベースURL に www. が含まれる（vercel.json の正規URL と一致）"
        - "すべてのページが含まれる"
        - "末尾スラッシュが統一されている"
        - "ベースURL に末尾スラッシュがない"
      
      url_consistency_check:
        description: "vercel.json と sitemap.ts の URL が統一されているか確認"
        
        check_1:
          name: "プロトコルの一致"
          rule: "vercel.json の destination と sitemap.ts の baseUrl が両方とも https://"
          example: "https://www.example.jp"
        
        check_2:
          name: "www の有無の一致"
          rule: "vercel.json で www.example.jp なら、sitemap も www.example.jp"
          note: "どちらも WWW_DOMAIN（正規URL）を使用"
        
        check_3:
          name: "ドメイン名の一致"
          rule: "vercel.json と sitemap.ts で同じドメイン名"
          example: "example.jp（同一）"
        
        critical_note: |
          🚨 重要: sitemap は必ず vercel.json から BASE_URL を取得する。
          手動で指定せず、必ず vercel.json を参照すること。
          これにより、vercel.json と sitemap.ts の URL が自動的に統一される。
  
  output:
    template: |
      ✅ app/sitemap.ts を作成しました
      
      - ベースURL: {BASE_URL}
      - 対象ページ数: {PAGE_COUNT}件
      - 生成URL: /sitemap.xml

# =============================================================================
# ワークフロー4: robots.txt 作成
# =============================================================================
workflow_4_robots:
  
  name: "public/robots.txt を作成"
  description: "検索エンジンのクローラーを制御"
  
  process:
    step_1:
      action: "ベースURL を取得"
      
      source: "workflow_3 で取得した BASE_URL を再利用"
      
      critical_note: |
        🚨 重要: BASE_URL は workflow_3（sitemap）と同じものを使用。
        これにより、robots.txt の Sitemap URL と実際の sitemap.xml の URL が
        自動的に統一される。
        
        必ず https + www の形式（vercel.json の正規URL）を使用。
      
      fallback: |
        workflow_3 で BASE_URL を取得していない場合:
        1. vercel.json を read_file で読み込む
        2. redirects[].destination から "https://www.{DOMAIN}" を抽出
        3. vercel.json と同じ URL を使用（一貫性を保証）
    
    step_2:
      action: "public/robots.txt を生成"
      
      method:
        tool: "write"
        target: "public/robots.txt"
      
      content_template: |
        User-agent: *
        Allow: /
        
        Sitemap: {BASE_URL}/sitemap.xml
      
      validation:
        - "User-agent: * が含まれる"
        - "Allow: / が含まれる"
        - "Sitemap URL が https:// で始まる"
  
  output:
    template: |
      ✅ public/robots.txt を作成しました
      
      内容:
      - User-agent: * （すべてのクローラーを許可）
      - Allow: / （すべてのパスを許可）
      - Sitemap: {BASE_URL}/sitemap.xml

# =============================================================================
# ワークフロー5: URLスラッグ最適化
# =============================================================================
workflow_5_url_slug:
  
  name: "URLスラッグを最適化"
  description: "サイトの内容を分析して、SEOフレンドリーなURL設計を提案"
  
  process:
    step_1:
      action: "日本語ディレクトリを検出"
      
      method:
        tool: "list_dir"
        target: "app/"
        
        detection: |
          app/ 配下のディレクトリ名を取得し、
          日本語（ひらがな、カタカナ、漢字）や特殊文字を含むものを検出。
      
      examples:
        - '✅ 検出: app/会社概要/'
        - '✅ 検出: app/お問い合わせ/'
        - '✅ 検出: app/サービス紹介/'
        - '❌ スキップ: app/company/'
    
    step_2:
      action: "各ディレクトリの page.tsx を読み込んでコンテンツを分析"
      
      method: |
        検出した日本語ディレクトリごとに page.tsx を読み込み、
        h1タグ、metadata.title、主要コンテンツから役割を特定する。
      
      example: |
        app/会社概要/page.tsx を読み込む
        → h1: "会社概要"
        → 役割: 会社情報のページ
    
    step_3:
      action: "サイトの内容を見て、適切な英語スラッグを生成"
      
      instructions: |
        ページの内容（h1、metadata、本文）を分析し、
        最適な英語スラッグを生成する。
        小文字、ハイフン区切りで簡潔に（1-2単語推奨）。
      
      common_translations:
        - "会社概要/会社情報 → company"
        - "お問い合わせ/問い合わせ → contact"
        - "事業内容 → business"
        - "サービス/サービス紹介 → services"
        - "実績 → works"
        - "採用情報 → recruit"
        - "ニュース → news"
        - "ブログ → blog"
      
      slug_rules:
        - "小文字のみ使用"
        - "単語の区切りはハイフン（-）"
        - "簡潔に（1-2単語推奨）"
    
    step_4:
      action: "提案を出力（実装はユーザーが手動で実施）"
      
      note: |
        🚨 重要: このワークフローは提案のみを行います。
        実際のディレクトリのリネームはユーザーが手動で行う必要があります。
        
        理由: ディレクトリ移動は以下の影響があるため：
        - Git 履歴への影響
        - import パスの一括変更が必要
        - ビルドエラーのリスク
  
  output:
    template: |
      ✅ URLスラッグを最適化しました
      
      【現状】
      日本語を含むディレクトリ:
      - {japanese_dir_1}（内容: {content_summary_1}）
      - {japanese_dir_2}（内容: {content_summary_2}）
      
      【推奨される変更】
      - {current_1} → {suggested_1}（理由: {reason_1}）
      - {current_2} → {suggested_2}（理由: {reason_2}）
      
      ⚠️ リネーム手順:
      ディレクトリのリネームは以下の手順で手動で実施してください：
      
      1. git mv {current} {suggested}
      2. すべてのリネームが完了してから git commit
      3. git push origin main
      
      💡 注意:
      - ディレクトリをリネームすると、import パスも変更が必要です
      - Next.js が自動的に更新しますが、ビルドエラーが出る場合は手動で修正してください

# =============================================================================
# 実行順序
# =============================================================================
execution_order:
  description: "「Google提出」トリガーで以下の順序で実行"
  
  critical_rules:
    - "🚨 すべてのワークフローを順番に実行し、スキップしないこと"
    - "🚨 各ワークフローの MANDATORY ステップを絶対にスキップしないこと"
    - "🚨 表面的な確認だけでなく、品質チェックを必ず実行すること"
  
  steps:
    - order: 1
      workflow: "workflow_1_alt_tags"
      name: "altタグ設定"
      mandatory_steps:
        - "画像の検出（multiline モード使用）"
        - "alt 属性の確認（存在するだけでなく、内容も確認）"
        - "品質チェック&自動改善（MANDATORY, skip_allowed: false）"
        - "不適切な alt の修正"
      warning: "❌ alt の存在確認だけで完了としない（品質チェック必須）"
    
    - order: 2
      workflow: "workflow_2_metadata"
      name: "metadata 設定"
      mandatory_steps:
        - "既存 metadata の確認"
        - "情報収集（優先順位に従う）"
        - "SEO情報生成（市場分析含む）"
        - "layout.tsx の更新"
    
    - order: 3
      workflow: "workflow_3_sitemap"
      name: "sitemap.ts 作成"
      mandatory_steps:
        - "ベースURL取得"
        - "ページ一覧取得（ファイルシステムのみ）"
        - "sitemap.ts 生成"
      warning: "❌ 外部URLを含めない（ファイルシステムのみ）"
    
    - order: 4
      workflow: "workflow_4_robots"
      name: "robots.txt 作成"
      mandatory_steps:
        - "ベースURL取得"
        - "robots.txt 生成"
    
    - order: 5
      workflow: "workflow_5_url_slug"
      name: "URLスラッグ最適化"
      mandatory_steps:
        - "日本語ディレクトリ検出"
        - "page.tsx 読み込み&分析"
        - "英語スラッグ提案"
  
  completion_message: |
    🎉 Google提出の準備が完了しました！
    
    ✅ 完了したタスク（すべての品質チェック含む）:
    1. altタグ設定（品質チェック&自動改善完了）
    2. metadata 設定（市場分析&SEO最適化完了）
    3. sitemap.ts 作成（外部URL混入防止完了）
    4. robots.txt 作成
    5. URLスラッグ最適化
    
    📋 次のステップ:
    1. npm run build でビルド
    2. Vercel にデプロイ
    3. Google Search Console に sitemap.xml を送信
    4. Google Analytics の設定（別途）

# =============================================================================
# トラブルシューティング
# =============================================================================
troubleshooting:
  issue_1:
    problem: "sitemap.xml が生成されない"
    solution: "npm run build でビルドし、/sitemap.xml にアクセス"
  
  issue_2:
    problem: "robots.txt が表示されない"
    solution: "public/robots.txt を確認、デプロイ後に /robots.txt にアクセス"
  
  issue_3:
    problem: "metadata が反映されない"
    solution: "npm run build でビルド、キャッシュをクリア"


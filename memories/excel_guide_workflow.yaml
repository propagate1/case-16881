# Excel Site Guide Generation

pentagonディレクトリの3つのファイル（README、generate_site_guide.py、config_sample.yaml）を参照し、
以下の手順でサイト構成ガイドのExcelファイルを生成してください。

## 手順

1. pentagon/README (3).md を読み、ツールの使い方を理解する
2. pentagon/config_sample (2).yaml を読み、config.yamlの書き方を理解する
3. app/components/shared/Header.tsx を確認し、ナビゲーションのリンク順でページ順を決定
4. app/components/shared/Footer.tsx を確認し、フッターの内容を把握
5. 各ページの page.tsx を確認し、コンポーネントの並び順を把握：
   - app/home/page.tsx
   - app/articles/page.tsx
   - app/about/page.tsx
   - app/contact/page.tsx
   - その他存在するページ
6. 各コンポーネントファイル（.tsx）の内容を読み込み、テキスト要素を抽出
7. ページ順・セクション順に従って pentagon/config.yaml を作成
8. 以下のコマンドを実行してExcelを生成：

```bash
cd pentagon && python "generate_site_guide (5).py" config.yaml output
```

## config.yaml の作成ルール

- site_name: 英数字のみ（ファイル名に使用）
- common_sections: ヘッダー・フッター（全ページ共通）
- pages: 各ページの定義（Header.tsx のナビ順に従う）
  - name: ページ名
  - sections: セクション一覧（page.tsx の並び順に従う）
    - name: セクション名
    - content: 内容（テキスト）

## contentの記載ルール

- 【セクション名】で始める
- 見出し、説明文、ボタンを改行区切りで記載
- ボタン・リンクは ► を先頭につける
- 箇条書きは ・ を使用
- サブセクションは ■ を使用



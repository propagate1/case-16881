              "has": [{ "type": "host", "value": "Example.JP" }],
              ...
            }
          ]
        }
      problem: "ドメインが正規化されていない（大文字が含まれている）"
      severity: "CRITICAL"
      note: "必ず小文字化してから使用すること"
      correct: "example.jp"
    
    violation_8:
      wrong_output: |
        {
          "redirects": [
            {
              "source": "/:path*",
              "has": [{ "type": "host", "value": "日本語.jp" }],
              ...
            }
          ]
        }
      problem: "IDN（日本語ドメイン）が正規化されていない"
      severity: "CRITICAL"
      note: "必ずPunycodeに変換してから使用すること"
      correct: "xn--wgv71a119e.jp"
    
    violation_9:
      wrong_output: |
        {
          "redirects": [
            {
              "source": "/:path*",
              "has": [{ "type": "host", "value": "https://example.jp" }],
              ...
            }
          ]
        }
      problem: "ドメインにプロトコル（https://）が含まれている"
      severity: "CRITICAL"
      note: "ドメイン部分のみを使用すること"
      correct: "example.jp"
    
    violation_10:
      wrong_output: |
        {
          "redirects": [
            { "source": "https://www.example.jp/:path*", "destination": "https://www.example.jp/:path*", "permanent": true }
          ]
        }
      problem: "自己リダイレクト（同一プロトコル・ホストへのリダイレクト）"
      severity: "CRITICAL"
      note: "リダイレクトループを引き起こす。最終形から最終形へのリダイレクトは作成禁止"
    
    correct_output: |
      ✅ 正しい2段出力：
      
      {
        "redirects": [...]
      }
      
      ✅ vercel.json の内容を出力しました！
      
      📋 次のステップ:
      1. 上記のJSONを vercel.json ファイルに保存
      ...
      
      ※ 重要: JSON（1段目）→ 空行 → 完了報告（2段目）の順序

# ==============================================================================
# トラブルシューティング
# ==============================================================================

troubleshooting:
  
  issue_1:
    problem: "vercel.json が生成されない"
    solution: |
      - domain_config.APEX_DOMAIN と domain_config.WWW_DOMAIN が正しく設定されているか確認
      - トリガー条件（action_keywords）が含まれているか確認
  
  issue_2:
    problem: "*.vercel.app もリダイレクトされてしまう"
    solution: |
      - "has": [{"type":"host","value":"..."}] 形式を使用する（推奨）
      - または source に完全なURL（プロトコル＋ホスト）を指定する
  
  issue_3:
    problem: "リダイレクトループが発生する"
    solution: |
      - https://{WWW_DOMAIN} へのリダイレクトは作成しない
      - http://{WWW_DOMAIN} → https://{WWW_DOMAIN} のみ作成する
  
  issue_4:
    problem: "既存の vercel.json が上書きされる懸念がある"
    solution: |
      - 既存ファイルの読み取りが可能な場合は、rule_5 の no-opチェックを実施
      - ファイルが読めない場合は、通常の2段出力を実施（ユーザーが手動で確認）
      - no-opチェックはオプショナルなので、実行できなくても問題ありません
    
    note: |
      AIがファイルを読めない環境では、常に出力される仕様です。
      ユーザーが既存ファイルと比較して、必要に応じて適用してください。
  
  issue_5:
    problem: "生成されたJSONに headers や rewrites などの余計なキーが含まれている"
    solution: |
      - rule_4 のバリデーションを確認
      - JSONルートには redirects キーのみを含めること
      - headers, rewrites, env などは削除する
    
    allowed_keys: ["redirects"]
    forbidden_keys: ["headers", "rewrites", "env", "cleanUrls", "trailingSlash", "framework"]
    
    note: |
      今回の目的はリダイレクトのみです。
      他のキーは不要で、混乱や意図しない動作の原因になります。
  
  issue_6:
    problem: "同じ source を持つリダイレクトが重複している"
    solution: |
      - 各 redirects[].source が一意であることを確認
      - 重複する source を持つリダイレクトを削除
    
    example_of_duplication: |
      ❌ 重複あり:
      {
        "redirects": [
          { "source": "http://example.jp/:path*", ... },
          { "source": "http://example.jp/:path*", ... }  // ← 重複
        ]
      }
      
      ✅ 重複なし:
      {
        "redirects": [
          { "source": "http://example.jp/:path*", ... },
          { "source": "https://example.jp/:path*", ... }  // ← 異なるsource
        ]
      }
    
    note: |
      重複は冗長で、JSONのサイズが大きくなるだけです。
      Vercelは最初にマッチしたリダイレクトを使用します。
  
  issue_7:
    problem: "ドメインに大文字が混入している"
    symptom: |
      - domain_config に "Example.JP" や "WWW.Example.JP" などが設定されている
      - 生成されたJSONに大文字のドメインが含まれている
    
    solution: |
      - step_2 の domain_normalization を確認
      - 小文字化が実行されているか確認
      - 正規化後の値がテンプレートに使用されているか確認
    
    example_normalization: |
      入力:
        APEX_DOMAIN: "Example.JP"
        WWW_DOMAIN: "WWW.Example.JP"
      
      正規化後:
        APEX_DOMAIN: "example.jp"
        WWW_DOMAIN: "www.example.jp"
      
      生成されるJSON:
      {
        "redirects": [
          {
            "source": "/:path*",
            "has": [{ "type": "host", "value": "example.jp" }],
            ...
          }
        ]
      }
  
  issue_8:
    problem: "日本語ドメイン（IDN）が正しく処理されない"
    symptom: |
      - domain_config に "日本語.jp" などが設定されている
      - リダイレクトが機能しない
    
    solution: |
      - step_2 の IDN正規化を確認
      - Punycodeに変換されているか確認（xn-- で始まる形式）
      - has: [{ type: host, value: ... }] に Punycode を使用
    
    example_idn_normalization: |
      入力:
        APEX_DOMAIN: "日本語.jp"
        WWW_DOMAIN: "www.日本語.jp"
      
      正規化後（Punycode）:
        APEX_DOMAIN: "xn--wgv71a119e.jp"
        WWW_DOMAIN: "www.xn--wgv71a119e.jp"
    
    note: |
      IDN（国際化ドメイン名）は、必ずPunycodeに変換してから使用してください。
      そのままの形式（日本語等）では、Vercelが正しく処理できません。
  
  issue_9:
    problem: "自己リダイレクトループが発生する"
    symptom: |
      - https://{WWW_DOMAIN} にアクセスすると無限リダイレクト
      - ブラウザに「リダイレクトが多すぎます」エラー
    
    solution: |
      - rule_4 の self_redirect_prevention を確認
      - https://{WWW_DOMAIN} → https://{WWW_DOMAIN} のリダイレクトを削除
      - 許可されるのは http://{WWW_DOMAIN} → https://{WWW_DOMAIN} のみ
    
    allowed_vs_forbidden: |
      ✅ 許可:
      - http://example.jp → https://www.example.jp（異なるプロトコル・ホスト）
      - https://example.jp → https://www.example.jp（異なるホスト）
      - http://www.example.jp → https://www.example.jp（異なるプロトコル）
      
      ❌ 禁止:
      - https://www.example.jp → https://www.example.jp（自己リダイレクト）
    
    note: |
      最終形（https://{WWW_DOMAIN}）から最終形へのリダイレクトは
      リダイレクトループを引き起こします。絶対に含めないでください。


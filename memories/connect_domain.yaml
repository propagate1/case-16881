      1. 上記のJSONを vercel.json ファイルに保存
      2. Vercel にデプロイ（git push または vercel deploy）
      3. Vercel のダッシュボードでカスタムドメインを登録
      4. DNS設定（Aレコード/CNAMEレコード）
      5. https://example.jp と https://www.example.jp でアクセス確認
      
      💡 リダイレクト設定:
      - http://example.jp → https://www.example.jp
      - https://example.jp → https://www.example.jp
      - http://www.example.jp → https://www.example.jp
      - *.vercel.app は影響を受けません
      

# =============================================================================
# 画像自動取得ワークフロー（v2.0.0）
# =============================================================================
# 目的: Google Drive から画像を自動選定・ダウンロード
#
# 対象: Next.js + Tailwind CSS プロジェクト（DefaultSetting クローン）
# 作成日: 2025-11-07
# 最終更新: 2025-11-13
# =============================================================================

schema_version: "2.0.0"

metadata:
  workflow_name: "画像自動取得"
  target_framework: "Next.js 13+ (App Router) + Drive Image Fetch CLI"
  enforcement: "MANDATORY"
  version: "2.1.0"
  created: "2025-11-07"
  updated: "2025-11-13"
  author: "DefaultSetting Project"
  description: |
    Google Drive から画像を自動選定・ダウンロード（3コマンド構成 + 重複防止機能）：
    
    コマンド1: /image-fetch-list
      → Step 0: OS選択（Mac/Windows）
      → Step 1: 全フォルダのリスト一括取得（1コマンド）
    
    コマンド2: /image-select
      → Step 2: AI対話形式での画像選定（重複チェック機能付き）
      → prev_selected.json を確認して重複選定を自動回避
    
    コマンド3: /image-download
      → Step 0: OS確認
      → Step 3: 画像ダウンロード実行（1コマンド）
      → Step 4: ダウンロード履歴の記録（自動）
    
    理由: コマンドを分けることで、Step 2（画像選定）でAIが手を抜かないようにする
    v2.1.0: 重複防止機能により、同じ画像を二重にダウンロードすることを防止

# =============================================================================
# 前提条件
# =============================================================================
prerequisites:
  tools:
    - "Node.js（14以降）"
    - "drive-img-cli（~/tools/drive-img-cli/ にインストール済み）"
    - "credentials.json（~/.config/drive-img-cli/ に配置済み）"
  
  folder_ids:
    photos: "1poeKyfUs85CqmPv5Tg6-aoWQs2cQiYPL"
    backgrounds: "1Dq5z-ct5w5QF8_xSM5RRjyksvwdnKZyw"
  
  note: |
    前提条件が揃っていない場合は、
    README (1).md の「初回セットアップ」を参照してセットアップが必要。

# =============================================================================
# ワークフロー（5ステップ）
# =============================================================================
workflow:
  
  step_0:
    name: "OS選択"
    status: "CRITICAL"
    skip_allowed: false
    
    description: |
      ユーザーのOSを確認し、適切なコマンドを使用する。
    
    action:
      ask_user: "使用しているOSを教えてください: Mac または Windows"
      
      response_options:
        - "Mac"
        - "macOS"
        - "Windows"
      
      determine_os:
        if_mac:
          use_commands: "macOS/Linux版のコマンド"
          shell: "bash"
        
        if_windows:
          use_commands: "Windows (PowerShell)版のコマンド"
          shell: "PowerShell"
    
    output:
      selected_os: "Mac または Windows"
      commands_variant: "macOS/Linux または PowerShell"
  
  step_1:
    name: "全フォルダのリスト一括取得"
    status: "CRITICAL"
    skip_allowed: false
    
    description: |
      Google Drive の photos と backgrounds フォルダから
      画像リストを一括取得し、scripts/ に保存する。
    
    commands:
      mac_linux: |
        DRIVE_IMG_FOLDER_ID="1poeKyfUs85CqmPv5Tg6-aoWQs2cQiYPL" \
        node ~/tools/drive-img-cli/drive-images.js list | grep -v '^\[dotenv@' | \
        node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const j=JSON.parse(s);console.log(JSON.stringify(j.items.map(x=>x.name),null,2))})" \
        > scripts/photos_index.json && \
        DRIVE_IMG_FOLDER_ID="1Dq5z-ct5w5QF8_xSM5RRjyksvwdnKZyw" \
        node ~/tools/drive-img-cli/drive-images.js list | grep -v '^\[dotenv@' | \
        node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const j=JSON.parse(s);console.log(JSON.stringify(j.items.map(x=>x.name),null,2))})" \
        > scripts/backgrounds_index.json && \
        echo "✅ 全フォルダのリスト取得完了！"
      
      windows_powershell: |
        # Photos
        $env:DRIVE_IMG_FOLDER_ID="1poeKyfUs85CqmPv5Tg6-aoWQs2cQiYPL"
        node $env:USERPROFILE\tools\drive-img-cli\drive-images.js list | Where-Object { $_ -notmatch '^\[dotenv@' } | ForEach-Object { $_ } | Out-String | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const j=JSON.parse(s);console.log(JSON.stringify(j.items.map(x=>x.name),null,2))})" > scripts\photos_index.json
        
        # Backgrounds
        $env:DRIVE_IMG_FOLDER_ID="1Dq5z-ct5w5QF8_xSM5RRjyksvwdnKZyw"
        node $env:USERPROFILE\tools\drive-img-cli\drive-images.js list | Where-Object { $_ -notmatch '^\[dotenv@' } | ForEach-Object { $_ } | Out-String | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const j=JSON.parse(s);console.log(JSON.stringify(j.items.map(x=>x.name),null,2))})" > scripts\backgrounds_index.json
        
        Write-Host "✅ 全フォルダのリスト取得完了！"
    
    execution:
      tool: "run_terminal_cmd"
      command: "step_0 で選択したOSに応じたコマンドを実行"
    
    output_files:
      - "scripts/photos_index.json"
      - "scripts/backgrounds_index.json"
    
    validation:
      - "scripts/photos_index.json が作成されている"
      - "scripts/backgrounds_index.json が作成されている"
      - "各ファイルがJSON配列形式"
      - "ファイル名のリストが含まれている"
  
  step_2:
    name: "AI対話形式での画像選定"
    status: "CRITICAL"
    skip_allowed: false
    
    description: |
      AIとの対話を通じて、ユーザーの要件に合う画像を選定し、
      scripts/selected.json に保存する。
      
      このステップは「photos」と「backgrounds」の両方を含む。
    
    ai_interaction:
      step_1:
        name: "AIからの質問"
        ai_asks: "どのような画像を選定しますか？"
        
        user_response_examples:
          - "about.yaml の要件に合う写真をお願いします"
          - "〇〇セクションに合うような画像"
          - "ヒーローセクション用の画像を選んでください"
          - "design.yaml に基づいて背景素材を選定してください"
      
      step_2:
        name: "AIによる選定実行"
        description: |
          ユーザーの要件を受けて、AIが以下のプロンプトに従って画像を選定する。
    
    selection_process:
      photos_selection:
        name: "Photos（写真）の選定"
        
        context_files:
          - "scripts/photos_index.json（必須）"
          - "about.yaml（ユーザー指定時）"
          - "design.yaml（ユーザー指定時）"
          - "その他、ユーザーが指定したYAMLファイル"
        
        prompt_template: |
          次のファイルを読み込んでください：
          - scripts/photos_index.json（写真リスト）
          - {ユーザーが指定した要件ファイル}
          
          {ユーザーの要件}に合う写真を、scripts/photos_index.json から選んでください。
      
      backgrounds_selection:
        name: "Backgrounds（背景）の選定"
        
        context_files:
          - "scripts/backgrounds_index.json（必須）"
          - "design.yaml（ユーザー指定時）"
          - "structure.yaml（ユーザー指定時）"
          - "その他、ユーザーが指定したYAMLファイル"
        
        background_filename_pattern: |
          📝 ファイル名の読み方：
          背景ファイルは以下の形式で命名されています：
          bg--vibe--pattern_type--repeatability--palette--brightness--contrast--busyness--gradient_axis--size.拡張子
          
          例: bg--simple--gradient--non-tile--warm--light--mid--calm--vertical--1920x1080.png
          - vibe: シンプル
          - pattern_type: グラデーション
          - repeatability: タイル不可
          - palette: 暖色系
          - brightness: 明るい
          - contrast: 中程度のコントラスト
          - busyness: 落ち着いた
          - gradient_axis: 縦方向
          - size: 1920x1080
        
        prompt_template: |
          次のファイルを読み込んでください：
          - scripts/backgrounds_index.json（背景素材リスト）
          - {ユーザーが指定した要件ファイル}
          
          {ユーザーの要件}に合う背景素材を、scripts/backgrounds_index.json から選んでください。
    
    critical_rules:
      status: "⚠️ CRITICAL - 絶対に守らなくてはいけないルール"
      reason: "これらのルールを守らないと、Step 3 のダウンロードコマンドがエラーします"
      
      rule_0:
        name: "重複防止（prev_selected.json確認）"
        description: |
          1. scripts/prev_selected.json の存在を確認する
          2. 存在する場合:
             - prev_selected.json を読み込む
             - prev_selected.json.photos に含まれるファイル名は絶対に選定しない
             - prev_selected.json.backgrounds に含まれるファイル名は絶対に選定しない
             - これにより、過去にダウンロード済みの画像の重複選定を防止する
          3. 存在しない場合:
             - 初回選定なので除外対象なし
             - 通常通り選定を進める
        
        why_important: |
          重複防止の重要性:
          - 同じ画像を二重にダウンロードすることを防ぐ
          - ストレージの無駄遣いを防止
          - 画像管理の効率化
          - prev_selected.jsonの有無で初回か2回目以降かを自動判定できる
        
        implementation: |
          選定時の手順:
          1. read_file で scripts/prev_selected.json を読み込む（ファイルが存在しない場合はエラーを無視）
          2. 存在する場合、prev_selected.json の内容をパース
          3. 新規選定時に、prev_selected.json.photos および prev_selected.json.backgrounds と
             重複しないファイルのみを選ぶ
      
      rule_1:
        name: "ファイル名の完全一致（順番に全て閲覧）"
        description: |
          1. grep検索で絞り込むことは絶対禁止（重要な写真を80%見落とす原因）
          2. scripts/photos_index.json を動的に分割して順番に全て読み込む:
             - 1回あたり250行ずつ読み込む
             - 総行数に応じて必要回数を計算: ceil(総行数 ÷ 250)
             - 例（935行の場合）: ceil(935 ÷ 250) = 4回
               - Batch 1: read_file(offset=1,   limit=250) → 1-250行目
               - Batch 2: read_file(offset=251, limit=250) → 251-500行目
               - Batch 3: read_file(offset=501, limit=250) → 501-750行目
               - Batch 4: read_file(offset=751, limit=185) → 751-935行目（残り185行）
          3. scripts/backgrounds_index.json を全て読み込む（通常は小規模）
          4. 配列の各要素（ファイル名）を1文字も変更せず、そのままコピーして選定する
          5. 選定後、各ファイル名が元のJSONに存在するか再確認する
        
        why_grep_is_forbidden: |
          grep検索の問題点:
          - キーワード絞り込みで80%の写真を見落とす（933枚中747枚）
          - 例: "media-", "publishing-", "library-", "research-" などを見逃す
          - 校閲サービスに直接関連する写真を逃す可能性が高い
          
          順番閲覧の利点:
          - 全933枚を漏れなく確認できる
          - 予想外のカテゴリから適切な写真を発見できる
          - ユーザーの要件に最も合う写真を選定できる
      
      rule_2:
        name: "除外条件"
        description: |
          - ファイル名に「, 」（カンマ+スペース）を含むものは選ばない
          - ファイル名に特殊文字（カンマ、セミコロン等）を含むものは避ける
      
      rule_3:
        name: "出力形式（JSON構造）"
        description: |
          - **構造化JSON形式**で scripts/selected.json として保存
          - 既存の selected.json が存在する場合は読み込み、**該当キーのみ更新**
          - 他のキー（photos, backgrounds, illusts）はそのまま保持
          - 各ファイル名は拡張子込みで完全一致
          - 説明やコードブロック、コメントは一切付けない
        
        output_format: |
          {
            "photos": ["選定した写真1.jpeg", "選定した写真2.jpeg"],
            "backgrounds": ["選定した背景1.png"],
            "illusts": []
          }
      
      rule_4:
        name: "検証手順（必須）"
        description: |
          選定完了後、選んだファイル名が photos_index.json または backgrounds_index.json に実在することを
          grep完全一致検索（-F オプション）で1件ずつ確認してから保存する
    
    validation_after_selection:
      check_1:
        name: "ファイルの存在確認"
        action: "scripts/selected.json が作成されているか確認"
      
      check_2:
        name: "JSON形式の確認"
        action: "正しいJSON形式か確認（パースエラーがないか）"
      
      check_3:
        name: "必須キーの確認"
        action: "photos, backgrounds, illusts キーが存在するか確認"
      
      check_4:
        name: "ファイル名の完全一致確認"
        action: |
          選定された各ファイル名が、
          scripts/photos_index.json または scripts/backgrounds_index.json に
          完全一致で存在するか確認（grep -F オプション使用）
    
    output_on_success: |
      ✅ scripts/selected.json の生成を確認しました
      
      選定された画像:
      - Photos: {photos_count}件
      - Backgrounds: {backgrounds_count}件
    
    output_on_error: |
      ❌ scripts/selected.json に問題があります
      
      問題:
      - {error_details}
      
      修正して再実行してください。
  
  step_3:
    name: "画像ダウンロード実行（一括）"
    status: "CRITICAL"
    skip_allowed: false
    
    description: |
      selected.json に基づいて、Google Drive から画像を一括ダウンロードする。
      photos と backgrounds を1コマンドで実行。
    
    commands:
      mac_linux: |
        # Photos のダウンロード
        DRIVE_IMG_FOLDER_ID="1poeKyfUs85CqmPv5Tg6-aoWQs2cQiYPL" \
        OUT_DIR="./public/img/photos" \
        node ~/tools/drive-img-cli/drive-images.js fetch \
        $(node -e "const d=JSON.parse(require('fs').readFileSync('scripts/selected.json','utf8')); console.log(d.photos.join(' '))") && \
        \
        # Backgrounds のダウンロード
        DRIVE_IMG_FOLDER_ID="1Dq5z-ct5w5QF8_xSM5RRjyksvwdnKZyw" \
        OUT_DIR="./public/img/backgrounds" \
        node ~/tools/drive-img-cli/drive-images.js fetch \
        $(node -e "const d=JSON.parse(require('fs').readFileSync('scripts/selected.json','utf8')); console.log(d.backgrounds.join(' '))") && \
        \
        echo "✅ 画像のダウンロードが完了しました！"
      
      windows_powershell: |
        # Photos のダウンロード
        $env:DRIVE_IMG_FOLDER_ID="1poeKyfUs85CqmPv5Tg6-aoWQs2cQiYPL"
        $env:OUT_DIR="./public/img/photos"
        $selectedData = Get-Content scripts\selected.json | ConvertFrom-Json
        $photosList = $selectedData.photos -join ' '
        node $env:USERPROFILE\tools\drive-img-cli\drive-images.js fetch $photosList
        
        # Backgrounds のダウンロード
        $env:DRIVE_IMG_FOLDER_ID="1Dq5z-ct5w5QF8_xSM5RRjyksvwdnKZyw"
        $env:OUT_DIR="./public/img/backgrounds"
        $bgList = $selectedData.backgrounds -join ' '
        node $env:USERPROFILE\tools\drive-img-cli\drive-images.js fetch $bgList
        
        Write-Host "✅ 画像のダウンロードが完了しました！"
    
    execution:
      tool: "run_terminal_cmd"
      command: "step_0 で選択したOSに応じたコマンドを実行"
      note: "photos と backgrounds を1つのコマンドブロックで連続実行"
    
    output_directories:
      - "./public/img/photos/"
      - "./public/img/backgrounds/"
    
    validation:
      - "public/img/photos/ に画像ファイルが存在する"
      - "public/img/backgrounds/ に画像ファイルが存在する"
      - "ダウンロード数が selected.json の件数と一致"
    
    output:
      template: |
        ✅ 画像のダウンロードが完了しました！
        
        保存先:
        - public/img/photos/ （{photos_count}件）
        - public/img/backgrounds/ （{backgrounds_count}件）
        
        💡 次のステップ:
        ダウンロードした画像をコンポーネントで使用できます。
  
  step_4:
    name: "ダウンロード履歴の記録とクリーンアップ"
    status: "MANDATORY"
    skip_allowed: false
    
    description: |
      ダウンロード完了後、scripts/prev_selected.json に履歴を記録し、
      scripts/selected.json を削除する。
      初回と2回目以降で処理が異なる。
      
      selected.json を削除する理由:
      - 次回の画像選定時に古い選定結果が残らないようにする
      - 誤って同じ画像を再ダウンロードすることを防止
      - ワークフローを明確化（選定 → ダウンロード → クリア）
    
    commands:
      mac_linux:
        initial: |
          # 初回: selected.json をコピー → 削除
          cp scripts/selected.json scripts/prev_selected.json
          rm scripts/selected.json
          echo "✅ ダウンロード履歴を記録しました（初回）"
          echo "📝 selected.json を削除しました（次回は新規選定が必要）"
        
        subsequent: |
          # 2回目以降: 既存の履歴とマージ → selected.json を削除
          node -e "const fs=require('fs');const prev=JSON.parse(fs.readFileSync('scripts/prev_selected.json','utf8'));const curr=JSON.parse(fs.readFileSync('scripts/selected.json','utf8'));const merged={photos:[...new Set([...prev.photos,...curr.photos])],backgrounds:[...new Set([...prev.backgrounds,...curr.backgrounds])],illusts:[...new Set([...prev.illusts,...curr.illusts])]};fs.writeFileSync('scripts/prev_selected.json',JSON.stringify(merged,null,2));const total=merged.photos.length+merged.backgrounds.length+merged.illusts.length;console.log('✅ ダウンロード履歴を更新（累計:',total,'件）')"
          rm scripts/selected.json
          echo "📝 selected.json を削除しました（次回は新規選定が必要）"
      
      windows_powershell:
        initial: |
          # 初回: selected.json をコピー → 削除
          Copy-Item scripts\selected.json scripts\prev_selected.json
          Remove-Item scripts\selected.json
          Write-Host "✅ ダウンロード履歴を記録しました（初回）"
          Write-Host "📝 selected.json を削除しました（次回は新規選定が必要）"
        
        subsequent: |
          # 2回目以降: 既存の履歴とマージ → selected.json を削除
          node -e "const fs=require('fs');const prev=JSON.parse(fs.readFileSync('scripts/prev_selected.json','utf8'));const curr=JSON.parse(fs.readFileSync('scripts/selected.json','utf8'));const merged={photos:[...new Set([...prev.photos,...curr.photos])],backgrounds:[...new Set([...prev.backgrounds,...curr.backgrounds])],illusts:[...new Set([...prev.illusts,...curr.illusts])]};fs.writeFileSync('scripts/prev_selected.json',JSON.stringify(merged,null,2));const total=merged.photos.length+merged.backgrounds.length+merged.illusts.length;console.log('✅ ダウンロード履歴を更新（累計:',total,'件）')"
          Remove-Item scripts\selected.json
          Write-Host "📝 selected.json を削除しました（次回は新規選定が必要）"
    
    execution:
      tool: "run_terminal_cmd"
      command: "scripts/prev_selected.json の存在確認後、適切なコマンドを実行"
      logic: |
        1. scripts/prev_selected.json が存在しない場合 → initial コマンドを実行
        2. scripts/prev_selected.json が存在する場合 → subsequent コマンドを実行
        3. 両方の場合で、最後に scripts/selected.json を削除する
    
    output_file:
      - "scripts/prev_selected.json"
    
    cleanup:
      - "scripts/selected.json を削除（次回選定のため）"
    
    validation:
      - "scripts/prev_selected.json が作成または更新されている"
      - "正しいJSON形式（photos, backgrounds, illusts キーを含む）"
      - "今回ダウンロードしたファイル名が含まれている"
      - "scripts/selected.json が削除されている"
    
    output:
      initial_template: |
        ✅ ダウンロード履歴を記録しました（初回）
        
        記録ファイル: scripts/prev_selected.json
        - Photos: {photos_count}件
        - Backgrounds: {backgrounds_count}件
        
        📝 selected.json を削除しました（次回は新規選定が必要）
      
      subsequent_template: |
        ✅ ダウンロード履歴を更新しました
        
        記録ファイル: scripts/prev_selected.json
        累計: {total_count}件
        - Photos: {total_photos}件
        - Backgrounds: {total_backgrounds}件
        
        📝 selected.json を削除しました（次回は新規選定が必要）

# =============================================================================
# 使用例（3コマンド構成）
# =============================================================================
usage_examples:
  example_1:
    title: "基本的な使い方（Mac）- 3コマンドで実行"
    
    command_1:
      user_input: "/image-fetch-list"
      ai_process:
        step_0: "OS選択"
        step_0_question: "使用しているOSを教えてください: Mac または Windows"
        user_reply: "Mac"
        
        step_1: "全フォルダのリスト一括取得（1コマンド）"
        step_1_command: "Mac/Linux版のコマンドを実行"
        step_1_result: "scripts/photos_index.json, scripts/backgrounds_index.json 作成"
      
      ai_output: |
        ✅ リスト取得が完了しました！
        
        次のステップ:
        画像を選定するには `/image-select` を実行してください。
    
    command_2:
      user_input: "/image-select"
      ai_process:
        load_files: |
          - memories/image_fetch_workflow.yaml (Step 2)
          - scripts/photos_index.json (完全読み込み)
          - scripts/backgrounds_index.json (完全読み込み)
          - scripts/prev_selected.json (存在する場合のみ、重複防止用)
        
        duplicate_check: |
          [重複チェック] scripts/prev_selected.json の存在確認
          - 存在しない → 初回選定なので除外なし
          - 存在する → 既存ファイルを読み込み、重複を除外
        
        ai_question: "どのような画像を選定しますか？"
        user_reply: "about.yaml の要件に合う写真をお願いします"
        
        ai_action: |
          - scripts/prev_selected.json を確認（存在する場合は読み込み）
          - about.yaml を読み込む
          - photos_index.json を順番に全て閲覧（grep検索は使用しない）:
            [総行数確認] 935行
            [必要回数計算] ceil(935 ÷ 250) = 4回
            [Batch 1/4] read_file(offset=1,   limit=250) → 1-250行目
            [Batch 2/4] read_file(offset=251, limit=250) → 251-500行目
            [Batch 3/4] read_file(offset=501, limit=250) → 501-750行目
            [Batch 4/4] read_file(offset=751, limit=185) → 751-935行目（残り185行）
          - backgrounds_index.json を全て読み込む
          - prev_selected.json に含まれないファイルのみを選定（重複回避）
          - 必須ルールに従ってファイル名を完全一致でコピー
          - scripts/selected.json に保存
          - grep -F で完全一致確認
        
        validation: "ファイル名の完全一致確認（grep -F）"
        result: "Photos: 5件, Backgrounds: 3件"
      
      ai_output: |
        ✅ scripts/selected.json の生成を確認しました
        
        選定された画像:
        - Photos: 5件
        - Backgrounds: 3件
        
        次のステップ:
        画像をダウンロードするには `/image-download` を実行してください。
    
    command_3:
      user_input: "/image-download"
      ai_process:
        step_0: "OS確認"
        step_0_question: "使用しているOSを教えてください: Mac または Windows"
        user_reply: "Mac"
        
        step_3: "画像ダウンロード（1コマンド）"
        step_3_command: "Mac/Linux版のコマンドを実行（photos + backgrounds 一括）"
        step_3_result: "public/img/photos/, public/img/backgrounds/ に保存"
        
        step_4: "ダウンロード履歴の記録"
        step_4_check: "scripts/prev_selected.json の存在確認"
        step_4_command: |
          - 存在しない（初回）: cp scripts/selected.json scripts/prev_selected.json
          - 存在する（2回目以降）: マージコマンドで更新
        step_4_result: "scripts/prev_selected.json を作成または更新"
      
      ai_output: |
        ✅ 画像のダウンロードが完了しました！
        
        保存先:
        - public/img/photos/ （5件）
        - public/img/backgrounds/ （3件）
        
        ✅ ダウンロード履歴を記録しました（初回）
        
        記録ファイル: scripts/prev_selected.json
        - Photos: 5件
        - Backgrounds: 3件
        
        💡 次のステップ:
        ダウンロードした画像をコンポーネントで使用できます。
  
  example_2:
    title: "特定セクション向けの画像選定"
    command: "/image-select"
    
    ai_process:
      ai_question: "どのような画像を選定しますか？"
      user_reply: "ヒーローセクション用の画像を選んでください"
      
      ai_action: |
        - about.yaml のヒーローセクションを確認
        - photos_index.json から該当する画像を選定
        - 必須ルールに従って selected.json に保存
        - grep -F で完全一致確認

# =============================================================================
# トラブルシューティング
# =============================================================================
troubleshooting:
  issue_1:
    problem: "ファイル名が photos_index.json に存在しない"
    cause: "ファイル名を推測・構築している"
    solution: |
      - photos_index.json を完全に読み込む
      - ファイル名を1文字も変更せず、そのままコピー
      - grep -F オプションで完全一致確認
  
  issue_2:
    problem: "selected.json の形式が間違っている"
    cause: "説明やコードブロックが含まれている"
    solution: |
      - 純粋なJSON形式のみ出力
      - 説明、コードブロック、コメントは一切付けない
  
  issue_3:
    problem: "画像がダウンロードされない"
    cause: "コマンドの実行に失敗"
    solution: |
      - drive-img-cli がインストールされているか確認
      - credentials.json が配置されているか確認
      - selected.json が正しい形式か確認

# =============================================================================
# 参考ドキュメント
# =============================================================================
references:
  drive_img_cli:
    repository: "https://github.com/propagate-webcreation/get_image.git"
    description: "Drive Image Fetch CLI ツール"
  
  note: |
    すべての必要な情報はこの yaml ファイルに移植されています。
    外部マニュアルへの依存はありません。

